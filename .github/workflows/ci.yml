name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so `next build` can collect page data;
      # no real services are contacted during the build.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA
      CLERK_SECRET_KEY: sk_test_ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts: the supabase dev-dependency downloads a binary in
      # its postinstall step, which is unnecessary for typecheck/build.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings=9999
        continue-on-error: true

      - name: Build
        run: npm run build
